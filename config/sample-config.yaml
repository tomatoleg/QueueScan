# ============================================================
# QueueScan Configuration
# ============================================================

app:
  # Application name (displayed in UI)
  name: "QueueScan"

  # Version shown in dashboard
  version: "0.1.0"


server:
  # Web server bind address
  host: "0.0.0.0"

  # Web server port
  port: 8080

  # JWT signing algorithm
  algorithm: "HS256"


network:
  # Allow unauthenticated access from this subnet
  # Example: 192.168.1. allows 192.168.1.x
  lan_prefix: "192.168.1."


session:
  # Session timeout in seconds (currently informational unless enforced)
  timeout: 3600


auth:
  # 🔐 CHANGE THIS in production!
  # Generate a key using: openssl rand -hex 32 
  secret_key: "XXXXXXXXXXXXXXXX508b84e5889699280fbZZZZZZZZZZZZZZZZZZZde5b37274d"

  # Token expiration time in hours
  token_expire_hours: 24


paths:
  # Absolute path to SDRTrunk recordings directory
  recordings: "/home/SDRTrunk/recordings"

  # Relative paths (from project root)
  talkgroups: "config/talkgroups.json"
  users: "config/users.json"
  html: "frontend/QueueScan.html"
  logs: "logs/login.log"
  static: "static"


limits:
  # Maximum number of calls stored in history
  max_history: 250

  # Maximum number of active talkgroups tracked
  max_active: 50

  # Number of recent calls stored for replay
  replay_buffer: 450
